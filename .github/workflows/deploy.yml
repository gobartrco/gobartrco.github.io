name: Build and deploy

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  Tag_release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Tag release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release

  Build:
    runs-on: ubuntu-latest
    needs: Tag_release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build CSS
        run: npm run postcss:build
      - name: Build with Jekyll
        run: bundle exec jekyll build --source ./ --destination ./_site --config _config.yml,_config.production.yml
        env:
          JEKYLL_ENV: production
      - name: Minify HTML
        run: npm run minify:html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  Deploy:
    environment:
      name: Production
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Purge Cache
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DOMAIN: ${{ vars.DOMAIN }}
          SUBDOMAIN: ${{ vars.SUBDOMAIN }}
        run: |
          set -euo pipefail
          echo "🗑️  Purging CloudFlare cache..."
          chmod +x .github/scripts/purge-cloudflare-cache.js
          node .github/scripts/purge-cloudflare-cache.js
